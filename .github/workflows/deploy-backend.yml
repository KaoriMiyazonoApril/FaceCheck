name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify backend compiles
        working-directory: backend
        run: ./mvnw -q -DskipTests verify

      - name: Run backend tests
        working-directory: backend
        run: ./mvnw -q test

      - name: Verify deploy bootstrap script
        shell: bash
        run: bash deploy/facecheck/tests/deploy_bootstrap_env_test.sh

  backend-deploy:
    needs: backend-verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy commit on server
        shell: bash
        env:
          FACECHECK_DEPLOY_HOST: ${{ secrets.FACECHECK_DEPLOY_HOST }}
          FACECHECK_DEPLOY_PASSWORD: ${{ secrets.FACECHECK_DEPLOY_SSH_KEY }}
          FACECHECK_DEPLOY_PORT: ${{ secrets.FACECHECK_DEPLOY_PORT }}
          FACECHECK_DEPLOY_USER: ${{ secrets.FACECHECK_DEPLOY_USER }}
        run: |
          set -euo pipefail
          ARCHIVE_PATH=/tmp/facecheck-deploy.tgz
          REMOTE_ARCHIVE_PATH=/tmp/facecheck-deploy.tgz

          tar \
            --exclude-vcs \
            --exclude='.serena' \
            --exclude='backend/target' \
            --exclude='app/build' \
            -czf "${ARCHIVE_PATH}" .

          sshpass -p "${FACECHECK_DEPLOY_PASSWORD}" scp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -P "${FACECHECK_DEPLOY_PORT:-22}" \
            "${ARCHIVE_PATH}" \
            "${FACECHECK_DEPLOY_USER}@${FACECHECK_DEPLOY_HOST}:${REMOTE_ARCHIVE_PATH}"

          sshpass -p "${FACECHECK_DEPLOY_PASSWORD}" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p "${FACECHECK_DEPLOY_PORT:-22}" \
            "${FACECHECK_DEPLOY_USER}@${FACECHECK_DEPLOY_HOST}" "
            set -euo pipefail
            DEPLOY_DIR=/opt/facecheck
            STAGE_DIR=/opt/facecheck-stage
            rm -rf \"\${STAGE_DIR}\"
            mkdir -p \"\${STAGE_DIR}\"
            tar -xzf \"${REMOTE_ARCHIVE_PATH}\" -C \"\${STAGE_DIR}\"
            rm -rf \"\${DEPLOY_DIR}\"
            mv \"\${STAGE_DIR}\" \"\${DEPLOY_DIR}\"
            rm -f \"${REMOTE_ARCHIVE_PATH}\"
            chmod +x \"\${DEPLOY_DIR}/deploy/facecheck/scripts/bootstrap_host.sh\"
            chmod +x \"\${DEPLOY_DIR}/deploy/facecheck/scripts/deploy.sh\"
            FACECHECK_ENV_FILE=/etc/facecheck/facecheck.env \"\${DEPLOY_DIR}/deploy/facecheck/scripts/bootstrap_host.sh\"
            FACECHECK_ENV_FILE=/etc/facecheck/facecheck.env \"\${DEPLOY_DIR}/deploy/facecheck/scripts/deploy.sh\"
          "
