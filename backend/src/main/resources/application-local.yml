spring:
  config:
    activate:
      on-profile: local
  datasource:
    hikari:
      maximum-pool-size: 5
  rabbitmq:
    listener:
      simple:
        auto-startup: false

logging:
  level:
    com.facecheck: INFO

facecheck:
  messaging:
    face-photo:
      register-queue: face.photo.register
      register-retry-queue: face.photo.register.retry
      register-dlq-queue: face.photo.register.dlq
      delete-queue: face.photo.delete.compensate
      delete-retry-queue: face.photo.delete.compensate.retry
      delete-dlq-queue: face.photo.delete.compensate.dlq
      retry-ttl-ms: 30000
