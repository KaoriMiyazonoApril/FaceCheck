spring:
  application:
    name: facecheck-backend
  profiles:
    default: local
  jackson:
    default-property-inclusion: non_null
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/facecheck}
    username: ${DB_USERNAME:facecheck}
    password: ${DB_PASSWORD:facecheck}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:facecheck}
    password: ${RABBITMQ_PASSWORD:facecheck}

server:
  shutdown: graceful
  error:
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health,info

facecheck:
  security:
    jwt:
      issuer: ${JWT_ISSUER:facecheck}
      secret: ${JWT_SECRET:replace-with-a-long-random-secret}
      expires-minutes: ${JWT_EXPIRES_MINUTES:120}
  huawei:
    enabled: ${HUAWEI_CLOUD_ENABLED:false}
    ak: ${FRS_AK:}
    sk: ${FRS_SK:}
    project-id: ${FRS_PROJECT_ID:}
    region: ${FRS_REGION:}
    frs-endpoint: ${FRS_ENDPOINT:}
    obs-endpoint: ${OBS_ENDPOINT:}
    obs-region: ${OBS_REGION:}
    obs-bucket: ${OBS_BUCKET:}
    face-set-name: ${FRS_FACE_SET_NAME:facecheck-default}
    similarity-threshold: ${FRS_SIMILARITY_THRESHOLD:85}
