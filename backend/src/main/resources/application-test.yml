spring:
  config:
    activate:
      on-profile: test
  jpa:
    show-sql: false
  docker:
    compose:
      enabled: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false
  flyway:
    locations: classpath:db/migration
    placeholders:
      seed_local_test_data_enabled: false

logging:
  level:
    com.facecheck: DEBUG

facecheck:
  checkin:
    rate-limit-window-seconds: 60
    rate-limit-max-requests: 5
    idempotency-ttl-hours: 24
    search-max-candidates: 3
    next-poll-after-seconds: 3
    async-enabled: false
