spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      seed_local_test_data_enabled: false
  docker:
    compose:
      enabled: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false

logging:
  level:
    com.facecheck: DEBUG
